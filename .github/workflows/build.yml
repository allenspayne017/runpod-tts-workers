name: build-runpod-images

# Builds the TADA-1B and Chatterbox Turbo worker images and pushes them to GHCR.
# We build here (not RunPod's GitHub builder, which is missing git) and RunPod pulls the
# finished image. Images stay small because model weights download at runtime, not build.

on:
  push:
    branches: [main]
    paths:
      - "tada-1b/**"
      - "chatterbox-turbo/**"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        worker: [tada-1b, chatterbox-turbo]
    steps:
      - uses: actions/checkout@v4

      # CUDA/pytorch base images are big — reclaim ~25GB on the runner first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: o
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.worker }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.worker }}
          file: ./${{ matrix.worker }}/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.o.outputs.owner }}/${{ matrix.worker }}-runpod:latest
          provenance: false
